name: Deploy Laravel to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd "${{ secrets.APP_DIR }}"

            git config --global --add safe.directory "${{ secrets.APP_DIR }}"

            # Configure Git credentials for private repo
            git remote set-url origin https://${{ secrets.GH_TOKEN }}@github.com/pegasus120mouan/abidjansports_admin.git

            git fetch --all
            git reset --hard origin/main

            composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

            # Update .env with S3/MinIO configuration
            sed -i 's/^FILESYSTEM_DISK=.*/FILESYSTEM_DISK=s3/' .env
            grep -q "^AWS_ENDPOINT=" .env || echo "AWS_ENDPOINT=${{ secrets.AWS_ENDPOINT }}" >> .env
            grep -q "^AWS_URL=" .env || echo "AWS_URL=${{ secrets.AWS_URL }}" >> .env
            sed -i "s|^AWS_ACCESS_KEY_ID=.*|AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}|" .env
            sed -i "s|^AWS_SECRET_ACCESS_KEY=.*|AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}|" .env
            sed -i "s|^AWS_BUCKET=.*|AWS_BUCKET=${{ secrets.AWS_BUCKET }}|" .env
            sed -i "s|^AWS_ENDPOINT=.*|AWS_ENDPOINT=${{ secrets.AWS_ENDPOINT }}|" .env
            sed -i "s|^AWS_USE_PATH_STYLE_ENDPOINT=.*|AWS_USE_PATH_STYLE_ENDPOINT=true|" .env
            sed -i "s|^AWS_URL=.*|AWS_URL=${{ secrets.AWS_URL }}|" .env

            php artisan migrate --force
            php artisan storage:link --force

            # Fix storage permissions
            chmod -R 775 storage bootstrap/cache
            chown -R www-data:www-data storage bootstrap/cache

            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
